<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>문제3. 이미지를 클릭하면 다른 이미지로 변경되도록 자바스크립트 프로그램을 작성하시오.</h2>
    <hr>
    <img  id="img" src="image1.jpg" style="width: 400px; height: 400px;">
    <script>
       document.addEventListener("DOMContentLoaded", function() {
  const img = document.getElementById("img");
  const images = ["image1.jpg", "image2.jpg"]; // 변경할 이미지들의 경로
  let currentIndex = 0; // 현재 이미지 인덱스

  img.addEventListener("click", function() {
    currentIndex = (currentIndex + 1) % images.length; // 다음 이미지 인덱스 계산
    const newImageSrc = images[currentIndex]; // 새로운 이미지 경로
    img.src = newImageSrc; // 이미지 변경
    img.alt = "이미지 " + (currentIndex + 1); // alt 텍스트 변경
  });
});
      </script>
</body>
</html>
