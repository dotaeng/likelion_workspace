<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>문제4. 입력 필드에서 받은 문자열을 대상으로 주어진 조건에 알맞도록 자바스크립트 프로그램을 작성하시오.</h2>
    <p>단, onclick() 사용</p>
    <p>입력 필드에서 받은 값 -> ex) let input = form['name'].value;</p>
    <p>입력 필드에서 부분이 공백이면 경고 대화상자가 뜬다.</p>
    <p>아이디를 5자 미만으로 작성했을 경우 경고 대화상자가 뜬다.</p>
    <p>패스워드 입력 부분이 공백이면 경고 대화상자가 뜬다.</p>
    <p>패스워드와 패스워드 검증 입력 필드에서 내용이 다를 경우 대화상자가 뜬다.</p>
    <hr>
    <form action="#" autocomplete="off">
        <label for="name">아이디</label>
        <input type="text" name="name" id="name">
        <label for="password1">비밀번호(6~8) 글자</label>
        <input type="password" name="password1">
        <p style="display: inline;"> 비밀번호 검증</p>
        <input type="password" name="password2">
        <input type="submit" name="submit" value="제출" onclick="validateFields()">
        <input type="reset" name="reset" 지우기>
    </form>
    <script>
       function validateFields() {
      const form = document.querySelector("form");
      const name = form['name'].value.trim();
      const password1 = form['password1'].value.trim();
      const password2 = form['password2'].value.trim();

      if (name === "") {
        alert("아이디는 공백일 수 없습니다.");
      } else if (name.length < 5) {
        alert("아이디는 5자 이상이어야 합니다.");
      }

      if (password1 === "") {
        alert("패스워드는 공백일 수 없습니다.");
      }

      if (password1 !== password2) {
        alert("패스워드가 일치하지 않습니다.");
      }
    }
    </script>
</body>
</html>
