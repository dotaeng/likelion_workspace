<!DOCTYPE html>
<html lang="kr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멋사과제1</title>
</head>
<body>
    <h1>멋쟁이사자처럼 동아리 지원서</h1><hr>

    <form action="hyw" method="post">
        <div>
            <label for="name">이름: </label>    
            <input id="name" name="userName" type="text">
        </div>
        <div>
            <label for="birth">생년월일: </label>
            <input id="birth" name="userBirth" type="text">
        </div>
        <div>
            <label for="age">나이: </label>
            <input id="age" name="userAge" type="text">
        </div>
        <div>
            <label>성별: </label>
            여자<input type="checkbox">
            남자<input type="checkbox">
        </div>
        <div>
            <label for="email">E-mail: </label>
            <input id="email" name="userEmail" type="text">
        </div>
        <div>
            <label>지원분야:</label>
            프론트엔드<input type="checkbox">
            백엔드<input type="checkbox">
        </div>
        <div>
            <label>-이 분야에 지원하게 된 동기를 적어주세요.</label><br>
            <textarea cols="70" rows="5"></textarea>
        </div>
       <div>
            <label>-동아리에 합격하게 된다면 하고 싶은 활동을 적어주세요.</label><br>
            <textarea cols="70" rows="5"></textarea>
       </div>


        <br><input type="submit">
    </form><br><br>

    멋쟁이사자처럼에 대해 더 알고싶다면?</a><br><br>
    <img src="/img/lion.jpg" width="200" height="150" alt="">  
</body>
</html>
