<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</head>
<body>
    <h2>멋쟁이사자처럼 동아리 지원서</h2><hr>
    <div>
        
        <div class="mb-3">
          <label for="exampleInputName1" class="form-label">이름</label>
          <input type="name" class="form-control" id="name">
        </div>
        <div class="mb-3">
            <label for="exampleInputbirth1" class="form-label">생년월일</label>
            <input type="birth" class="form-control" id="birth">
          </div>
        <div class="mb-3">
            <label for="exampleInputage1" class="form-label">나이</label>
            <input type="age" class="form-control" id="age">
          </div>
          <br>
          성별: 
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="checkbox" id="inlineCheckbox1" value="option1">
            <label class="form-check-label" for="inlineCheckbox1">여자</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="checkbox" id="inlineCheckbox2" value="option2">
            <label class="form-check-label" for="inlineCheckbox2">남자</label>
          </div>


        <div class="mb-3">
            <br><label for="exampleFormControlInput1" class="form-label">Email</label>
            <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="name@example.com">
          </div>
          <br>
          지원분야:&nbsp;
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="checkbox" id="inlineCheckbox1" value="option1">
            <label class="form-check-label" for="inlineCheckbox1">프론트엔드</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="checkbox" id="inlineCheckbox2" value="option2">
            <label class="form-check-label" for="inlineCheckbox2">백엔드</label>
          </div>
        </div>
        <br>

          <div class="mb-3">
            <label for="exampleFormControlTextarea1" class="form-label">-이 분야에 지원하게 된 동기를 적어주세요.</label>
            <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
          </div>

          <div class="mb-3">
            <label for="exampleFormControlTextarea1" class="form-label">-동아리에 합격하게 된다면 하고 싶은 활동을 적어주세요.</label>
            <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
          </div>

        <button type="submit" class="btn btn-primary">제출</button>
      </form>
</body>
</html>
